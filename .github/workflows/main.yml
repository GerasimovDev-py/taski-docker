name: Main Taski workflow

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13.10
        env:
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: django_db
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12  
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install flake8==7.3.0 flake8-isort==7.0.0
          pip install -r ./backend/requirements.txt 
      - name: Test with flake8 and django tests
        env:
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: django_db
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
        run: |
          python -m flake8 backend/
          cd backend/
          python manage.py test

  build_and_push_to_docker_hub:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker 
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taski_backend:latest

  frontend_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up nodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: |
          cd frontend/
          npm ci
      - name: Test frontend
        run: |
          cd frontend/
          npm run test

  build_frontend_and_push_to_docker_hub:
    name: Push frontend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: frontend_tests
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker 
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taski_frontend:latest

  build_gateway_and_push_to_docker_hub:
    name: Push gateway Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker 
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./gateway/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taski_gateway:latest

  deploy:
    runs-on: ubuntu-latest
    needs: 
      - build_and_push_to_docker_hub
      - build_frontend_and_push_to_docker_hub
      - build_gateway_and_push_to_docker_hub
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # ==================== DEBUG SSH CONNECTION ====================
      - name: Setup SSH key and debug connection
        run: |
          mkdir -p ~/.ssh
          
          cat > ~/.ssh/deploy_key << 'EOL'
-----BEGIN OPENSSH PRIVATE KEY-----
b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
QyNTUxOQAAACC74tldN1sxhFaR2OWalhrp8QQQgKOSrrNfxHvjRxJm2wAAAKg80BEAPNAR
AAAAAAtzc2gtZWQyNTUxOQAAACC74tldN1sxhFaR2OWalhrp8QQQgKOSrrNfxHvjRxJm2w
AAAEBuWvcDjdN/OcB9WDUgrEGxRAACYy5Jkv0SZwuASOnyXbvi2V03WzGEVpHY5ZqWGunx
BBCAo5Kus1/Ee+NHEmbbAAAAH3Byb2plY3RtZWRpYXN0dWRpbzMwNkBnbWFpbC5jb20BAg
MEBQY=
-----END OPENSSH PRIVATE KEY-----
EOL

          chmod 600 ~/.ssh/deploy_key
          
          echo "=== SSH Key fingerprint ==="
          ssh-keygen -lf ~/.ssh/deploy_key
          
          echo "=== Public key extracted from private key ==="
          ssh-keygen -y -f ~/.ssh/deploy_key
          
          echo "=== Adding host to known_hosts ==="
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>&1 || echo "ssh-keyscan failed"
          
          echo "=== Trying SSH connection (verbose) ==="
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -v ${{ secrets.USER }}@${{ secrets.HOST }} "echo '=== SSH CONNECTION SUCCESSFUL ==='; whoami; pwd; ls -la; id; echo '=== Server ready ==='"
        timeout-minutes: 3

      # ==================== COPY docker-compose ====================
      - name: Copy docker-compose.yml to server
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key docker-compose.production.yml ${{ secrets.USER }}@${{ secrets.HOST }}:~/taski/

      # ==================== DEPLOY ====================
      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.USER }}@${{ secrets.HOST }} << 'EOF'
            set -e
            cd taski
            echo "=== Pulling images ==="
            sudo docker compose -f docker-compose.production.yml pull
            echo "=== Restarting containers ==="
            sudo docker compose -f docker-compose.production.yml down
            sudo docker compose -f docker-compose.production.yml up -d
            echo "=== Running migrations ==="
            sudo docker compose -f docker-compose.production.yml exec backend python manage.py migrate
            echo "=== Collecting static ==="
            sudo docker compose -f docker-compose.production.yml exec backend python manage.py collectstatic --noinput
            sudo docker compose -f docker-compose.production.yml exec backend cp -r /app/collected_static/. /backend_static/static/ || true
            echo "=== Deployment completed successfully ==="
          EOF