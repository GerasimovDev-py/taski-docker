  deploy:
    runs-on: ubuntu-latest
    needs: 
      - build_and_push_to_docker_hub
      - build_frontend_and_push_to_docker_hub
      - build_gateway_and_push_to_docker_hub
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Copy docker-compose.production.yml to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "~/taski"
          strip_components: 0

      - name: Deploy on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          strict_host_key_checking: false
          debug: true
          script: |
            set -e
            echo "=== SSH connection successful ==="
            whoami
            pwd
            ls -la

            cd ~/taski

            echo "=== Pulling new images ==="
            sudo docker compose -f docker-compose.production.yml pull

            echo "=== Restarting containers ==="
            sudo docker compose -f docker-compose.production.yml down
            sudo docker compose -f docker-compose.production.yml up -d

            echo "=== Running migrations ==="
            sudo docker compose -f docker-compose.production.yml exec backend python manage.py migrate

            echo "=== Collecting static ==="
            sudo docker compose -f docker-compose.production.yml exec backend python manage.py collectstatic --noinput || true
            sudo docker compose -f docker-compose.production.yml exec backend cp -r /app/collected_static/. /backend_static/static/ || true

            echo "=== Deployment completed successfully ==="