version: '3'

volumes:
  pg_data:
  static:

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  backend:
    image: vvgerasimov/taski_backend:latest
    env_file: .env
    volumes:
      - static:/backend_static
    restart: always

  frontend:
    image: vvgerasimov/taski_frontend:latest
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/frontend_static
    restart: always

  gateway:
    image: vvgerasimov/taski_gateway:latest
    env_file: .env
    volumes:
      - static:/staticfiles
    ports:
      - 8000:80
    restart: always